    <!-- Open Graph -->

    <meta property="og:url" content="https://meetup.growdoc.com.br/growth">
    <meta property="og:title" content="GrowDoc — Mais Pacientes, Mais Faturamento">
    <meta property="og:description" content="Implante um sistema completo de aquisição de pacientes qualificados. Rastreio de dados, inteligência comercial e equipe dedicada ao seu crescimento.">

    <meta name="twitter:image" content="https://meetup.growdoc.com.br/images/logo.png">

    <link rel="preconnect" href="https://connect.facebook.net">
    <link rel="dns-prefetch" href="https://connect.facebook.net">
    <link rel="preconnect" href="https://bkp.growdoc.com.br" crossorigin>
    <link rel="dns-prefetch" href="https://bkp.growdoc.com.br">

    <!-- Performance: preload do logo (LCP element) -->
    <link rel="preload" href="https://bkp.growdoc.com.br/wp-content/uploads/2025/01/GrowDoc-Logo-11.png" as="image" fetchpriority="high">

    <!-- Critical CSS inline — evita flash branco antes do React montar -->
    <style>body{background:#131515}#root{min-height:100dvh}</style>

    <!-- Meta Pixel — carrega após page load para não bloquear LCP -->
    <script>
    window.addEventListener('load', function() {
        !function(f,b,e,v,n,t,s)
        {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
        n.callMethod.apply(n,arguments):n.queue.push(arguments)};
        if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
        n.queue=[];t=b.createElement(e);t.async=!0;
        t.src=v;s=b.getElementsByTagName(e)[0];
        s.parentNode.insertBefore(t,s)}(window, document,'script',
        'https://connect.facebook.net/en_US/fbevents.js');
        fbq('init', '824344831959206');
        fbq('track', 'PageView');
    });
    </script>
    <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=824344831959206&ev=PageView&noscript=1"
    /></noscript>

  </head>
