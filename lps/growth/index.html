<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/grow_ico.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GrowDoc — Mais Pacientes, Mais Faturamento</title>

    <!-- Performance: preconnect -->
    <link rel="preconnect" href="https://connect.facebook.net">
    <link rel="dns-prefetch" href="https://connect.facebook.net">
    <link rel="preconnect" href="https://bkp.growdoc.com.br" crossorigin>
    <link rel="dns-prefetch" href="https://bkp.growdoc.com.br">

    <!-- Meta Pixel — carrega após page load para não bloquear LCP -->
    <script>
    window.addEventListener('load', function() {
        !function(f,b,e,v,n,t,s)
        {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
        n.callMethod.apply(n,arguments):n.queue.push(arguments)};
        if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
        n.queue=[];t=b.createElement(e);t.async=!0;
        t.src=v;s=b.getElementsByTagName(e)[0];
        s.parentNode.insertBefore(t,s)}(window, document,'script',
        'https://connect.facebook.net/en_US/fbevents.js');
        fbq('init', '824344831959206');
        fbq('track', 'PageView');
    });
    </script>
    <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=824344831959206&ev=PageView&noscript=1"
    /></noscript>
    <!-- End Meta Pixel -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
